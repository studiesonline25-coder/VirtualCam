name: Build VirtualCam APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.4'
        cache-disabled: true

    - name: Build APKs
      run: gradle assembleDebug assembleRelease

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: VirtualCam-Debug
        path: app/build/outputs/apk/debug/*.apk

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: VirtualCam-Release
        path: app/build/outputs/apk/release/*.apk

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ github.run_number }}
        name: VirtualCam v${{ github.run_number }}
        files: |
          app/build/outputs/apk/debug/*.apk
          app/build/outputs/apk/release/*.apk
        body: |
          ### VirtuCam V3 - Android 15 Release
          - **Release APK**: Signed with debug key (Ready to install)
          - **Debug APK**: Standard development build
          - Includes: RTSP low-latency, Ultra-low buffer, Multi-Surface support.
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
